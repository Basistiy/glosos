services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp
    working_dir: /app
    user: "10001:10001"
    volumes:
      - ./user:/app/user:rw
      - ./.config/keys/google-stt-service-account.json:/app/.config/keys/google-stt-service-account.json:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    command: ["python", "agent.py", "start"]
