services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp
    working_dir: /app
    user: "10001:10001"
    volumes:
      - ./users:/app/users:rw
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    command: ["python", "agent.py", "start"]
