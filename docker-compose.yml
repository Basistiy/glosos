services:
  agent:
    image: ${GLOSOS_IMAGE:-ghcr.io/basistiy/glosos:latest}
    pull_policy: always
    read_only: true
    tmpfs:
      - /tmp
    working_dir: /app
    user: "10001:10001"
    volumes:
      - ./config:/app/config:ro
      - ./user:/app/user:rw
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    command: ["python", "secret_agent.py", "start"]
